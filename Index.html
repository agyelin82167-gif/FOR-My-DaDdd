<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To My Hero - Father's Day Special</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Quicksand:wght@400;600&family=Playfair+Display:italic,wght@700&display=swap');

        :root {
            --bg-deep: #050505;
            --navy-glass: rgba(26, 42, 108, 0.7);
            --gold: #d4af37;
            --white-glass: rgba(255, 255, 255, 0.12);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: radial-gradient(circle at center, #1a1a1a 0%, var(--bg-deep) 100%);
            font-family: 'Quicksand', sans-serif;
            overflow: hidden;
        }

        /* အပေါ်ကနေအောက်ကို ကျလာတဲ့ ကြယ်ကြွေ Animation */
        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            opacity: 0.5;
            box-shadow: 0 0 10px white;
            animation: snowfall var(--duration) infinite linear;
        }

        @keyframes snowfall {
            0% { transform: translateY(-10vh) translateX(0); opacity: 0; }
            20% { opacity: 0.8; }
            100% { transform: translateY(110vh) translateX(20px); opacity: 0; }
        }

        .wrapper {
            position: relative;
            z-index: 10;
        }

        /* Glassmorphism Envelope */
        .envelope {
            position: relative;
            width: 330px;
            height: 200px;
            background: var(--navy-glass);
            backdrop-filter: blur(8px);
            border-radius: 0 0 15px 15px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.8);
            border: 1px solid rgba(255, 255, 255, 0.1);
            z-index: 5;
        }

        /* ရွှေရောင် အနားသတ်ပန်းချီ */
        .envelope::after {
            content: "⚜️";
            position: absolute;
            bottom: 25px;
            left: 50%;
            transform: translateX(-50%);
            color: var(--gold);
            font-size: 32px;
            filter: drop-shadow(0 0 5px var(--gold));
        }

        /* စာအိတ်အဖုံး */
        .envelope::before {
            content: "";
            position: absolute;
            top: 0; left: 0;
            z-index: 10;
            border-top: 120px solid rgba(32, 58, 140, 0.9);
            border-left: 165px solid transparent;
            border-right: 165px solid transparent;
            transform-origin: top;
            transition: all 1s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* Open State */
        .open.wrapper .envelope::before {
            transform: rotateX(180deg);
            z-index: 1;
        }

        /* God Level Glass Letter */
        .letter {
            position: absolute;
            bottom: 10px;
            left: 5%;
            width: 90%;
            height: 180px;
            background: var(--white-glass);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border-radius: 15px;
            padding: 35px;
            text-align: center;
            transition: 1.2s all cubic-bezier(0.17, 0.67, 0.83, 0.67);
            z-index: 2;
            opacity: 0;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .open.wrapper .letter {
            transform: translateY(-180px) scale(1.05);
            opacity: 1;
            height: auto;
            min-height: 320px;
            z-index: 15;
            box-shadow: 0 20px 50px rgba(0,0,0,0.6);
        }

        .letter h1 {
            font-family: 'Cinzel', serif;
            color: var(--gold);
            font-size: 20px;
            margin-bottom: 20px;
            border-bottom: 1px solid var(--gold);
            display: inline-block;
            letter-spacing: 3px;
        }

        .letter p {
            font-size: 15px;
            color: #ffffff;
            line-height: 1.9;
            font-weight: 500;
            text-shadow: 0 2px 10px rgba(0,0,0,0.5);
            font-family: 'Quicksand', sans-serif;
        }

        /* Luxury Button */
        .btn-container {
            margin-top: 70px;
            z-index: 20;
        }

        .btn-gold {
            padding: 16px 45px;
            background: transparent;
            color: var(--gold);
            border: 1.5px solid var(--gold);
            border-radius: 2px;
            font-size: 13px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 4px;
            cursor: pointer;
            transition: 0.5s;
            display: block;
        }

        .btn-gold:hover {
            background: var(--gold);
            color: black;
            box-shadow: 0 0 30px rgba(212, 175, 55, 0.5);
        }

        .seal {
            position: absolute;
            top: 40%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 11;
            transition: 0.5s;
            color: var(--gold);
            font-size: 45px;
        }

        .open.wrapper .seal { opacity: 0; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div class="wrapper" id="mainWrapper">
        <div class="seal">⚔️</div>
        <div class="envelope">
            <div class="letter">
                <h1>ချစ်ရပါသော ဖေဖေ... ✨</h1>
                <p id="typedText"></p>
            </div>
        </div>
    </div>

    <div class="btn-container">
        <button class="btn-gold" id="actionBtn" onclick="openMagic()">ဒါလေးကိုနှိပ်ပါ🥀</button>
    </div>

    <script>
        // သားတစ်ယောက်အနေနဲ့ ရေးသားထားတဲ့ ပိုမိုကောင်းမွန်တဲ့ စာသား
        const message = "ဖေဖေ... သားတို့ရဲ့ မိသားစုကို တာဝန်ကျေပွန်စွာနဲ့ ဦးဆောင်ပေးခဲ့တဲ့ ဖေဖေ့ရဲ့ ကျေးဇူးတွေက သားအတွက်တော့ မြင်းမိုရ်တောင်ထက်တောင် ပိုမိုမြင့်မားပါတယ်။ သား ဘဝမှာ လဲကျတိုင်း ဖေဖေ့ရဲ့ ဆုံးမစကားတွေက ခွန်အားဖြစ်စေခဲ့သလို၊ ဖေဖေ့လို ခိုင်မာတဲ့ ယောင်္ကျားကောင်းတစ်ယောက်ဖြစ်ဖို့ သား အမြဲအားကျခဲ့ရပါတယ်။ ဖေဖေ အမြဲတမ်း ကျန်းမာပျော်ရွှင်ပြီး သားနဲ့အတူ အကြာကြီး ရှိနေပေးပါဦးနော်။ ဖေဖေ့ကို သား အသက်ထက်မက အရမ်းချစ်ပါတယ်... ❤️";
        
        const textContainer = document.getElementById('typedText');
        const wrapper = document.getElementById('mainWrapper');
        const btn = document.getElementById('actionBtn');

        function openMagic() {
            wrapper.classList.add('open');
            btn.classList.add('hidden'); // ပြန်ပိတ်လို့မရအောင် Button ကို ဖျောက်လိုက်ခြင်း

            let i = 0;
            function type() {
                if (i < message.length) {
                    textContainer.innerHTML += message.charAt(i);
                    i++;
                    setTimeout(type, 55);
                }
            }
            setTimeout(type, 1500);
        }

        // Falling Stars Effect
        function initSnowStars() {
            const container = document.body;
            for (let i = 0; i < 60; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                const size = Math.random() * 3 + 1 + 'px';
                star.style.width = size;
                star.style.height = size;
                star.style.left = Math.random() * 100 + 'vw';
                star.style.setProperty('--duration', Math.random() * 5 + 4 + 's');
                star.style.animationDelay = Math.random() * 5 + 's';
                container.appendChild(star);
            }
        }
        initSnowStars();
    </script>
</body>
</html>
